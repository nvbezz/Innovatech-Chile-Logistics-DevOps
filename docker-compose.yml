services:
  frontend:
    image: ${DOCKERHUB_USERNAME}/innovatech-frontend:latest
    ports:
      - "80:80"
    depends_on:
      - backend-despachos
      - backend-ventas
    restart: unless-stopped
    networks:
      - innovatech-net

  backend-despachos:
    image: ${DOCKERHUB_USERNAME}/innovatech-backend-despachos:latest
    ports:
      - "8081:8081"
    environment:
      DB_ENDPOINT: db-innovatech
      DB_PORT: 3306
      DB_NAME: ${DB_NAME}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
    depends_on:
      db-innovatech:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - innovatech-net

  backend-ventas:
    image: ${DOCKERHUB_USERNAME}/innovatech-backend-ventas:latest
    ports:
      - "8082:8080"
    environment:
      DB_ENDPOINT: db-innovatech
      DB_PORT: 3306
      DB_NAME: ${DB_NAME}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
    depends_on:
      db-innovatech:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - innovatech-net

  db-innovatech:
    image: mysql:8.0
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s
    restart: unless-stopped
    networks:
      - innovatech-net

volumes:
  mysql-data:

networks:
  innovatech-net:
    driver: bridge