services:
  frontend:
    image: ${DOCKERHUB_USERNAME}/innovatech-frontend:latest
    ports:
      - "80:80"
    depends_on:
      - backend-despachos
      - backend-ventas
    restart: unless-stopped
    networks:
      - innovatech-net

  backend-despachos:
    image: ${DOCKERHUB_USERNAME}/innovatech-backend-despachos:latest
    ports:
      - "8081:8081"
    environment:
      DB_ENDPOINT: db-despachos
      DB_PORT: 3306
      DB_NAME: ${DB_NAME}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
    depends_on:
      db-despachos:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - innovatech-net

  backend-ventas:
    image: ${DOCKERHUB_USERNAME}/innovatech-backend-ventas:latest
    ports:
      - "8082:8080"
    environment:
      DB_ENDPOINT: db-ventas
      DB_PORT: 3306
      DB_NAME: ${DB_NAME}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
    depends_on:
      db-ventas:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - innovatech-net

  db-despachos:
    image: mysql:8.0
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - mysql-despachos-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root -p$${MYSQL_ROOT_PASSWORD} || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - innovatech-net

  db-ventas:
    image: mysql:8.0
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - mysql-ventas-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root -p$${MYSQL_ROOT_PASSWORD} || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - innovatech-net

volumes:
  mysql-despachos-data:
  mysql-ventas-data:

networks:
  innovatech-net:
    driver: bridge