name: CI/CD Backend Ventas - Deploy to EC2

on:
  push:
    branches:
      - deploy

jobs:
  build-and-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        run: |
          docker build \
            -t ${{ secrets.DOCKERHUB_USERNAME }}/innovatech-backend-ventas:latest \
            -t ${{ secrets.DOCKERHUB_USERNAME }}/innovatech-backend-ventas:${{ github.sha }} \
            ./back-Ventas_SpringBoot/Springboot-API-REST
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/innovatech-backend-ventas:latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/innovatech-backend-ventas:${{ github.sha }}

  deploy-to-ec2:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Copiar docker-compose.yml a EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_BACKEND_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "docker-compose.yml"
          target: "~/innovatech"

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_BACKEND_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: DOCKERHUB_USERNAME,DB_NAME,DB_USERNAME,DB_PASSWORD
          script: |
            export DOCKERHUB_USERNAME=${{ secrets.DOCKERHUB_USERNAME }}
            export DB_NAME=${{ secrets.DB_NAME }}
            export DB_USERNAME=${{ secrets.DB_USERNAME }}
            export DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/innovatech-backend-ventas:latest
            cd ~/innovatech
            docker-compose up -d --force-recreate backend-ventas